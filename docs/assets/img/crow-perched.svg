<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 400" fill="none" aria-labelledby="crow-perched-title">
  <title id="crow-perched-title">Perched American Crow silhouette</title>

  <defs>
    <linearGradient id="iridescence" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1011"/>
      <stop offset="35%" stop-color="#1a1d22"/>
      <stop offset="55%" stop-color="#2a2438"/>
      <stop offset="75%" stop-color="#1a2a2c"/>
      <stop offset="100%" stop-color="#0a0d0e"/>
    </linearGradient>

    <linearGradient id="iridescence-wing" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#0a0d0e"/>
      <stop offset="40%" stop-color="#1d2530"/>
      <stop offset="60%" stop-color="#2c2238"/>
      <stop offset="100%" stop-color="#0a0d0e"/>
    </linearGradient>
  </defs>

  <!-- Branch perch -->
  <path d="M 30 350 Q 90 348 160 352 Q 230 356 295 350 L 298 358 Q 230 364 160 360 Q 90 356 30 360 Z"
        fill="#3a2e22" opacity="0.85"/>
  <path d="M 100 352 L 95 358 M 180 354 L 178 360 M 240 353 L 244 359"
        stroke="#241b14" stroke-width="1.2" opacity="0.6"/>

  <!-- Legs -->
  <path d="M 142 305 L 138 348 M 142 305 L 132 350 M 142 305 L 148 350"
        stroke="#0a0d0e" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M 178 305 L 182 348 M 178 305 L 188 350 M 178 305 L 172 350"
        stroke="#0a0d0e" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Body — main mass -->
  <path d="M 160 110
           C 215 115, 235 165, 230 220
           C 225 270, 200 305, 160 308
           C 120 305, 95 270, 90 220
           C 85 165, 105 115, 160 110 Z"
        fill="url(#iridescence)"/>

  <!-- Wing folded over back -->
  <path d="M 168 130
           C 215 145, 235 195, 220 260
           C 210 290, 190 300, 175 295
           C 195 270, 205 220, 195 175
           C 188 150, 178 138, 168 130 Z"
        fill="url(#iridescence-wing)"/>

  <!-- Tail extending below -->
  <path d="M 130 285
           L 125 340
           L 145 320
           L 155 345
           L 165 320
           L 175 345
           L 185 320
           L 195 340
           L 188 285 Z"
        fill="url(#iridescence)"/>

  <!-- Head -->
  <path d="M 160 70
           C 195 72, 215 95, 213 120
           C 210 138, 195 148, 175 148
           L 142 148
           C 122 148, 110 130, 112 110
           C 115 85, 130 70, 160 70 Z"
        fill="url(#iridescence)"/>

  <!-- Forehead/crown distinctive corvid flat-top suggestion -->
  <path d="M 135 75 Q 160 60 195 80 Q 200 90 195 95 Q 160 80 135 90 Z"
        fill="#0a0d0e" opacity="0.55"/>

  <!-- Bill — chunky, slightly curved, defining feature -->
  <path d="M 213 110
           L 268 118
           L 275 124
           L 270 128
           L 213 124 Z"
        fill="#0a0d0e"/>
  <path d="M 213 124
           L 270 128
           L 268 134
           L 213 132 Z"
        fill="#0a0d0e"/>
  <!-- Bill highlight -->
  <path d="M 220 115 L 260 121" stroke="#1f2226" stroke-width="0.6" opacity="0.7"/>

  <!-- Eye — pale, alert -->
  <circle cx="195" cy="105" r="3.4" fill="#e8d9b4"/>
  <circle cx="196" cy="105.5" r="1.8" fill="#0a0d0e"/>

  <!-- Subtle iridescent feather suggestion lines on wing -->
  <path d="M 178 175 Q 200 195 210 220" stroke="#3a3050" stroke-width="0.7" fill="none" opacity="0.4"/>
  <path d="M 175 195 Q 198 215 207 240" stroke="#244448" stroke-width="0.7" fill="none" opacity="0.4"/>
  <path d="M 172 215 Q 195 235 200 260" stroke="#3a3050" stroke-width="0.7" fill="none" opacity="0.35"/>
</svg>
